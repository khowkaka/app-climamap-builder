plugins { id 'com.android.application' }

android { namespace 'com.webview.climamapcom'; compileSdk 35
    defaultConfig { applicationId 'com.webview.climamapcom'; minSdk 23; targetSdk 35; versionCode 1; versionName '1.0.0' }
    buildTypes {
        debug { debuggable false }
        release { minifyEnabled true; shrinkResources false; proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro' }
    }
}
